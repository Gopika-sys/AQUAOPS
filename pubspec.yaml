name: aquaopss
description: "A professional Operations Command Center dashboard."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # UI & Styling
  google_fonts: ^6.2.1
  font_awesome_flutter: ^11.0.0
  animate_do: ^5.1.0
  percent_indicator: ^4.2.3
  intl: ^0.19.0

  # Data & State
  provider: ^6.1.2
  fl_chart: ^1.2.0
  shared_preferences: ^2.5.5

  # Firebase
  firebase_core: ^3.0.0
  cloud_firestore: ^5.6.12
  connectivity_plus: ^7.1.1
  fluttertoast: ^9.1.0
  google_maps_flutter: ^2.17.1
  geolocator: ^14.0.2
  flutter_polyline_points: ^3.1.0
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^22.0.0
  sliding_up_panel: ^2.0.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Asset registration
  assets:
    - assets/images/logo.png